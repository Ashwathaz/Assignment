<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#fafafa"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#212121">AWS CI/CD Architecture — Jenkins + Docker + Nginx</text>

  <!-- Developer -->
  <rect x="40" y="80" width="150" height="50" rx="8" fill="#333" />
  <text x="115" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Developer</text>

  <!-- GitHub -->
  <rect x="40" y="180" width="150" height="50" rx="8" fill="#24292e" />
  <text x="115" y="210" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">GitHub Repo</text>

  <line x1="115" y1="130" x2="115" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- EC2 box -->
  <rect x="280" y="80" width="440" height="360" rx="10" fill="#fff" stroke="#f7941d" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#f7941d">EC2 (Ubuntu, t2.micro) — Elastic IP</text>

  <!-- Jenkins -->
  <rect x="310" y="130" width="180" height="55" rx="8" fill="#008CBA"/>
  <text x="400" y="155" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Jenkins</text>
  <text x="400" y="172" text-anchor="middle" fill="#fff" font-size="11">(Docker container)</text>

  <line x1="190" y1="205" x2="310" y2="157" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="195" font-size="11" fill="#555">webhook</text>

  <!-- Docker build -->
  <rect x="310" y="210" width="180" height="55" rx="8" fill="#0db7ed"/>
  <text x="400" y="235" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Docker Build</text>
  <text x="400" y="252" text-anchor="middle" fill="#fff" font-size="11">app:BUILD_NUMBER</text>
  <line x1="400" y1="185" x2="400" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nginx container -->
  <rect x="310" y="290" width="180" height="55" rx="8" fill="#4CAF50"/>
  <text x="400" y="315" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Nginx Container</text>
  <text x="400" y="332" text-anchor="middle" fill="#fff" font-size="11">serves app/ static files</text>
  <line x1="400" y1="265" x2="400" y2="290" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CloudWatch agent -->
  <rect x="530" y="130" width="160" height="55" rx="8" fill="#c8102e"/>
  <text x="610" y="152" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CloudWatch</text>
  <text x="610" y="168" text-anchor="middle" fill="#fff" font-size="11">Agent (metrics/logs)</text>
  <line x1="490" y1="157" x2="530" y2="157" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IAM Role -->
  <rect x="530" y="210" width="160" height="55" rx="8" fill="#555"/>
  <text x="610" y="232" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">IAM Role</text>
  <text x="610" y="248" text-anchor="middle" fill="#fff" font-size="11">EC2-App-Role</text>

  <!-- Security Group note -->
  <rect x="290" y="390" width="420" height="40" rx="6" fill="#fff3e0" stroke="#f7941d"/>
  <text x="500" y="415" text-anchor="middle" font-size="12" fill="#8a5a00">Security Group: 22/8080 → admin IP only, 80/443 → public</text>

  <!-- Users -->
  <rect x="800" y="290" width="150" height="55" rx="8" fill="#333"/>
  <text x="875" y="322" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">End Users</text>
  <line x1="490" y1="317" x2="800" y2="317" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="310" font-size="11" fill="#555">HTTP/HTTPS</text>

  <!-- S3 -->
  <rect x="800" y="130" width="150" height="55" rx="8" fill="#569A31"/>
  <text x="875" y="152" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Amazon S3</text>
  <text x="875" y="168" text-anchor="middle" fill="#fff" font-size="11">backups (encrypted)</text>
  <line x1="490" y1="237" x2="875" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="200" font-size="11" fill="#555">S3 sync</text>

  <!-- CloudWatch dashboard -->
  <rect x="800" y="210" width="150" height="55" rx="8" fill="#c8102e"/>
  <text x="875" y="232" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CloudWatch</text>
  <text x="875" y="248" text-anchor="middle" fill="#fff" font-size="11">Dashboard + Alarms</text>
  <line x1="690" y1="157" x2="800" y2="220" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Gateway/Lambda -->
  <rect x="290" y="480" width="420" height="60" rx="8" fill="#f0f0f0" stroke="#999" stroke-dasharray="5,4"/>
  <text x="500" y="503" text-anchor="middle" font-size="12" fill="#555" font-weight="600">Optional: API Gateway → Lambda</text>
  <text x="500" y="520" text-anchor="middle" font-size="11" fill="#777">/health endpoint, serverless</text>

  <text x="500" y="590" text-anchor="middle" font-size="11" fill="#999">CI/CD Pipeline — AWS Free Tier Deployment (Single EC2 Instance)</text>
</svg>
